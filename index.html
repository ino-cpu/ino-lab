<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>INO.DIGITAL | HD Upscaler</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0c12; font-family: 'Inter', 'Space Grotesk', sans-serif; color: #eef5ff; overflow-x: hidden; }
    .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: rgba(8,12,20,0.96); backdrop-filter: blur(16px); border-right: 1px solid rgba(0,255,255,0.2); z-index: 1000; transition: left 0.3s ease; padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 1.5rem; }
    .sidebar.open { left: 0; }
    .sidebar-brand .brand-text { font-size: 1.3rem; font-weight: 700; background: linear-gradient(135deg, #fff, #7df9ff); -webkit-background-clip: text; background-clip: text; color: transparent; text-align: center; }
    .nav-sidebar { display: flex; flex-direction: column; gap: 0.5rem; }
    .nav-item { background: transparent; border: none; padding: 0.7rem 1rem; font-size: 0.95rem; font-weight: 500; color: #bbd4f0; cursor: pointer; border-radius: 1rem; display: flex; align-items: center; gap: 12px; width: 100%; text-align: left; }
    .nav-item i { width: 24px; }
    .nav-item.active { background: rgba(0,255,255,0.15); color: #0ff; border-left: 3px solid #0ff; }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(2px); z-index: 999; display: none; }
    .overlay.active { display: block; }
    .main-content { padding: 2rem; max-width: 1300px; margin: 0 auto; }
    .menu-toggle { position: fixed; top: 1rem; left: 1rem; z-index: 1001; background: rgba(0,255,255,0.2); border: none; font-size: 1.5rem; color: #0ff; cursor: pointer; padding: 0.4rem 0.8rem; border-radius: 0.6rem; }
    .banner { text-align: center; margin: 0.5rem 0 2rem 0; }
    .banner-img { width: 100%; max-width: 600px; border-radius: 1rem; border: 1px solid rgba(0,255,255,0.3); }
    .stats-row { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-bottom: 2rem; }
    .stat-card { background: linear-gradient(145deg, #0f1722, #080c14); border-radius: 1rem; padding: 0.8rem 1.5rem; text-align: center; border: 1px solid rgba(0,255,255,0.2); }
    .stat-number { font-size: 1.8rem; font-weight: 800; color: #0ff; }
    .stat-label { font-size: 0.7rem; text-transform: uppercase; }
    .tab-pane { display: none; animation: fade 0.25s; }
    .tab-pane.active { display: block; }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    .grid { display: grid; grid-template-columns: 1fr; gap: 1.5rem; max-width: 700px; margin: 0 auto; }
    .card { background: rgba(12,20,30,0.6); backdrop-filter: blur(4px); border-radius: 1.2rem; border: 1px solid rgba(0,255,255,0.2); padding: 1.5rem; }
    .card-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; border-left: 3px solid #0ff; padding-left: 0.8rem; }
    .quality-row { display: flex; gap: 0.8rem; justify-content: center; margin-bottom: 1rem; flex-wrap: wrap; }
    .quality-btn { background: #071118; border: 1px solid #2c5f6e; border-radius: 2rem; padding: 0.4rem 1rem; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
    .quality-btn.active { background: #0ff; color: #000; border-color: #0ff; }
    .upload-area { border: 2px dashed rgba(0,255,255,0.4); border-radius: 1rem; background: rgba(0,20,30,0.3); padding: 0.8rem; text-align: center; cursor: pointer; margin-bottom: 1rem; transition: 0.2s; }
    .upload-area:hover { border-color: cyan; background: rgba(0,255,255,0.05); }
    .preview-img, .result-img { max-width: 100%; max-height: 260px; border-radius: 0.8rem; margin: 0.5rem auto 0; display: block; border: 1px solid #0ff; cursor: pointer; }
    button { background: linear-gradient(95deg, #0077aa, #2a2a7a); border: none; padding: 0.5rem 1rem; border-radius: 2rem; font-weight: 500; color: white; cursor: pointer; transition: 0.2s; width: 100%; }
    button:hover { transform: translateY(-2px); filter: brightness(1.05); }
    .result-box { margin-top: 1rem; background: #010b0f; padding: 1rem; border-radius: 1rem; text-align: center; }
    .download-btn { background: rgba(0,255,255,0.1); border: 1px solid #0ff; padding: 3px 10px; border-radius: 2rem; font-size: 0.7rem; cursor: pointer; display: inline-block; margin: 4px; text-decoration: none; color: #0ff; }
    .flex-btns { display: flex; gap: 0.5rem; justify-content: center; margin-top: 0.5rem; flex-wrap: wrap; }
    .support-section { background: rgba(12,20,30,0.6); border-radius: 1.2rem; padding: 1.2rem; margin-top: 1.5rem; }
    .support-title { font-size: 1rem; font-weight: 600; margin-bottom: 0.8rem; border-left: 3px solid #0ff; padding-left: 0.8rem; }
    .social-row { display: flex; flex-wrap: wrap; gap: 0.8rem; margin: 0.8rem 0; }
    .social-link { background: #071118; padding: 0.4rem 1rem; border-radius: 2rem; color: #bbd4f0; text-decoration: none; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 6px; }
    .qr-trigger { background: #071118; padding: 0.4rem 1rem; border-radius: 2rem; display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
    .qr-fullscreen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; }
    .qr-fullscreen img { max-width: 80%; max-height: 70%; border-radius: 1rem; border: 2px solid cyan; }
    .close-fullscreen { margin-top: 1rem; background: rgba(0,255,255,0.2); border: 1px solid cyan; padding: 0.5rem 1.5rem; border-radius: 2rem; color: cyan; cursor: pointer; }
    footer { text-align: center; margin-top: 2rem; font-size: 0.7rem; color: #6c8faa; }
    .image-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(12px);
      z-index: 3000;
      justify-content: center;
      align-items: center;
    }
    .image-modal img { max-width: 90%; max-height: 85%; border-radius: 1rem; border: 2px solid cyan; }
    .image-modal .close-modal { position: absolute; top: 20px; right: 30px; font-size: 2rem; color: cyan; cursor: pointer; background: none; border: none; width: auto; }
    @media (max-width: 768px) { .main-content { padding: 1rem; } .grid { max-width: 100%; } }
    .toast-notice { background: #ffaa66; color: #000; padding: 5px 10px; border-radius: 20px; font-size: 0.7rem; margin-top: 8px; display: inline-block; }
  </style>
</head>
<body>
<div class="app">
  <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-brand"><div class="brand-text">INO.DIGITAL</div></div>
    <div class="nav-sidebar">
      <button class="nav-item active" data-tab="home"><i class="fas fa-home"></i> Home</button>
      <button class="nav-item" data-tab="ai"><i class="fas fa-microchip"></i> AI Tools</button>
    </div>
  </div>
  <div class="overlay" id="overlay"></div>
  <div class="main-content">
    <!-- HOME TAB -->
    <div id="homeTab" class="tab-pane active">
      <div class="banner"><img src="https://files.catbox.moe/ya9m8g.png" onerror="this.onerror=null; this.src='https://placehold.co/600x300/0a1a2a/0ff?text=Home';" class="banner-img"><h1>INO.DIGITAL</h1><p>AI-Powered HD Upscaler</p></div>
      <div class="stats-row"><div class="stat-card"><div class="stat-number" id="totalGen">0</div><div class="stat-label">Total Generate</div></div><div class="stat-card"><div class="stat-number">1.2K</div><div class="stat-label">Active Users</div></div><div class="stat-card"><div class="stat-number">98%</div><div class="stat-label">Kepuasan</div></div></div>
      <div class="support-section"><div class="support-title"><i class="fas fa-share-alt"></i> Connect & Support</div><div class="social-row"><a href="https://wa.me/6281234567890" class="social-link"><i class="fab fa-whatsapp"></i> WhatsApp</a><a href="https://chat.whatsapp.com/invite" class="social-link"><i class="fab fa-whatsapp"></i> Grup WA</a><a href="https://tiktok.com/@ino.digital" class="social-link"><i class="fab fa-tiktok"></i> TikTok</a><a href="mailto:hello@ino.digital" class="social-link"><i class="fas fa-envelope"></i> Contact Dev</a></div><div class="support-title" style="margin-top:0.8rem;"><i class="fas fa-hand-holding-heart"></i> Donasi</div><div class="social-row"><div class="qr-trigger" id="qrTrigger"><i class="fas fa-qrcode"></i> Tampilkan QR Donasi</div></div></div>
    </div>

    <!-- AI TOOLS TAB (HD Upscaler) -->
    <div id="aiTab" class="tab-pane">
      <div class="banner" style="margin-bottom:1rem"><img src="https://files.catbox.moe/iyfl5r.png" onerror="this.onerror=null; this.src='https://placehold.co/600x300/0a1a2a/0ff?text=AI+Tools';" class="banner-img"></div>
      <div class="grid">
        <div class="card">
          <div class="card-title"><i class="fas fa-magic"></i> HD Upscaler</div>
          <div class="quality-row" id="qualitySelector">
            <span class="quality-btn" data-quality="4x">4x</span>
            <span class="quality-btn" data-quality="6x">6x</span>
            <span class="quality-btn" data-quality="8x">8x</span>
          </div>
          <div id="hdDropzone" class="upload-area"><i class="fas fa-cloud-upload-alt"></i> Upload image (JPEG/PNG)<input type="file" id="hdFile" accept="image/jpeg,image/png,image/webp" style="display:none"></div>
          <div id="hdPreview" style="display:none; text-align:center"><img id="hdPreviewImg" class="preview-img" style="cursor:pointer;"></div>
          <button id="hdUpscaleBtn" disabled>⬆️ Upscale to <span id="selectedQualityLabel">4x</span></button>
          <div id="hdResult" class="result-box"></div>
        </div>
      </div>
    </div>
    <footer>INO.DIGITAL — HD Upscaler</footer>
  </div>
  <div id="qrFullscreen" class="qr-fullscreen"><img id="qrFullImage" src=""><button class="close-fullscreen" id="closeFullscreen">Tutup</button></div>
</div>

<!-- Modal Zoom -->
<div id="imageModal" class="image-modal">
  <button class="close-modal"><i class="fas fa-times"></i></button>
  <img id="modalImage" src="" alt="Zoom">
</div>

<script>
  // ======================= GLOBAL =======================
  let totalGen = localStorage.getItem('ino_total_gen') ? parseInt(localStorage.getItem('ino_total_gen')) : 2847;
  document.getElementById('totalGen').innerText = totalGen;
  function incGen() { totalGen++; document.getElementById('totalGen').innerText = totalGen; localStorage.setItem('ino_total_gen', totalGen); }
  function showToast(msg, isErr=false, isWarn=false) {
    let bg = isErr ? '#ff8888' : (isWarn ? '#ffaa66' : '#0ff');
    let t=document.createElement('div');
    t.style.cssText='position:fixed;bottom:20px;right:20px;background:#0a141fe6;backdrop-filter:blur(8px);border-left:3px solid '+bg+';padding:6px 12px;border-radius:10px;z-index:2000;font-size:0.75rem;color:white';
    t.innerHTML=`<i class="fas ${isErr?'fa-times-circle':(isWarn?'fa-exclamation-triangle':'fa-check-circle')}" style="color:${bg}"></i> ${msg}`;
    document.body.appendChild(t); setTimeout(()=>t.remove(),3000);
  }

  // Modal Zoom
  function openModal(imgSrc) {
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImage');
    modalImg.src = imgSrc;
    modal.style.display = 'flex';
  }
  function closeModal() {
    document.getElementById('imageModal').style.display = 'none';
  }
  document.querySelector('.close-modal').addEventListener('click', closeModal);
  document.getElementById('imageModal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('imageModal')) closeModal();
  });

  function attachDownload(container) {
    container.querySelectorAll('.download-btn').forEach(btn=>{
      btn.addEventListener('click',(e)=>{
        e.preventDefault();
        let url=btn.getAttribute('data-url');
        if(url){ let a=document.createElement('a'); a.href=url; a.download=url.split('/').pop()||'image.jpg'; a.click(); showToast('Download started'); }
      });
    });
    const img = container.querySelector('.result-img');
    if(img) img.onclick = () => openModal(img.src);
  }

  // ======================= QUALITY SELECTOR =======================
  let selectedQuality = '4x';
  const qualityBtns = document.querySelectorAll('.quality-btn');
  const selectedQualitySpan = document.getElementById('selectedQualityLabel');
  qualityBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      qualityBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedQuality = btn.getAttribute('data-quality');
      selectedQualitySpan.innerText = selectedQuality;
      // Notifikasi bahwa untuk 6x/8x masih menggunakan 4x karena API terbatas
      if (selectedQuality !== '4x') {
        showToast(`⚠️ Pilihan ${selectedQuality} belum tersedia di API. Gambar akan di-upscale ke 4x (kualitas tertinggi).`, false, true);
      }
    });
  });
  qualityBtns[0].classList.add('active'); // default 4x

  // ======================= HD UPSCALER =======================
  let selectedHdFile = null;
  const hdDrop = document.getElementById('hdDropzone'), hdInput = document.getElementById('hdFile'), hdPreviewDiv = document.getElementById('hdPreview'), hdPreviewImg = document.getElementById('hdPreviewImg'), hdBtn = document.getElementById('hdUpscaleBtn');
  hdDrop.addEventListener('click',()=>hdInput.click());
  hdInput.addEventListener('change',(e)=>{if(e.target.files[0]) handleHdFile(e.target.files[0]);});
  ['dragenter','dragover','dragleave','drop'].forEach(ev=>hdDrop.addEventListener(ev,e=>e.preventDefault()));
  hdDrop.addEventListener('dragover',()=>hdDrop.classList.add('drag-over'));
  hdDrop.addEventListener('dragleave',()=>hdDrop.classList.remove('drag-over'));
  hdDrop.addEventListener('drop',(e)=>{e.preventDefault();hdDrop.classList.remove('drag-over');if(e.dataTransfer.files[0]) handleHdFile(e.dataTransfer.files[0]);});
  function handleHdFile(file){ 
    if(!file.type.startsWith('image/')) return showToast('Only images',true); 
    selectedHdFile=file; 
    const r=new FileReader(); 
    r.onload=(e)=>{
      hdPreviewImg.src=e.target.result; 
      hdPreviewDiv.style.display='block'; 
      hdBtn.disabled=false;
      hdPreviewImg.onclick = () => openModal(hdPreviewImg.src);
    }; 
    r.readAsDataURL(file); 
  }

  hdBtn.addEventListener('click',async()=>{
    if(!selectedHdFile) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
      const base64 = e.target.result.split(',')[1];
      const filename = selectedHdFile.name;
      const resDiv = document.getElementById('hdResult');
      resDiv.innerHTML = '<span class="loading"></span> Mengupgrade...';
      try {
        // Panggil API (hanya 4x, tapi kita tetap kirim parameter quality jika API mendukung di masa depan)
        const response = await fetch('/api/hdimage', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: base64, filename, quality: selectedQuality })
        });
        const data = await response.json();
        if (data.status === true && data.result?.url) {
          const imgUrl = data.result.url;
          resDiv.innerHTML = `<img src="${imgUrl}" class="result-img"><div class="flex-btns"><button class="download-btn" data-url="${imgUrl}"><i class="fas fa-download"></i> Download</button></div><div style="font-size:0.7rem; margin-top:6px;">Hasil upscale ke ${selectedQuality} (API: 4x)</div>`;
          attachDownload(resDiv);
          incGen();
          if (selectedQuality !== '4x') {
            showToast(`Hasil ditampilkan dalam kualitas 4x karena API hanya mendukung 4x.`, false, true);
          }
        } else {
          throw new Error(data.message || 'Gagal upscale');
        }
      } catch(err) {
        resDiv.innerHTML = `<span style="color:#ff8888">Error: ${err.message}</span><button class="retry-btn" style="background:rgba(255,100,100,0.2); border:1px solid #ff8888; margin-top:0.5rem; padding:0.2rem 0.6rem; border-radius:1rem; color:#ff8888; cursor:pointer; width:auto;" onclick="hdBtn.click()">🔄 Coba Lagi</button>`;
      }
    };
    reader.readAsDataURL(selectedHdFile);
  });

  // QR Donasi
  const qrTrigger=document.getElementById('qrTrigger'), qrFull=document.getElementById('qrFullscreen'), qrImg=document.getElementById('qrFullImage'), closeQr=document.getElementById('closeFullscreen');
  qrImg.src='https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=KOPAY%20NMD%20%3A%20ID1025411950211';
  qrTrigger.onclick=()=>qrFull.style.display='flex';
  closeQr.onclick=()=>qrFull.style.display='none';
  qrFull.onclick=(e)=>{if(e.target===qrFull) qrFull.style.display='none';};

  // Sidebar & tab
  const menuToggle=document.getElementById('menuToggle'), sidebar=document.getElementById('sidebar'), overlay=document.getElementById('overlay');
  function closeSidebar(){ sidebar.classList.remove('open'); overlay.classList.remove('active'); }
  function openSidebar(){ sidebar.classList.add('open'); overlay.classList.add('active'); }
  menuToggle.onclick=()=>{ if(sidebar.classList.contains('open')) closeSidebar(); else openSidebar(); };
  overlay.onclick=closeSidebar;
  const navBtns=document.querySelectorAll('.nav-item'), panes=document.querySelectorAll('.tab-pane');
  navBtns.forEach(btn=>{ btn.onclick=()=>{ let tabId=btn.getAttribute('data-tab')+'Tab'; navBtns.forEach(b=>b.classList.remove('active')); btn.classList.add('active'); panes.forEach(p=>p.classList.remove('active')); document.getElementById(tabId).classList.add('active'); closeSidebar(); }; });

  // Loading style
  const style=document.createElement('style');
  style.textContent='.loading{display:inline-block;width:14px;height:14px;border:2px solid #0ff;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.drag-over{border-color:#0ff;background:rgba(0,255,255,0.05)}';
  document.head.appendChild(style);
</script>
</body>
</html>
