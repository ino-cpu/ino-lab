<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INO.DIGITAL — Ultimate API Suite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: radial-gradient(circle at 10% 20%, #0a0a1a, #010005);
      font-family: 'Inter', sans-serif;
      color: #eef5ff;
      min-height: 100vh;
      overflow-x: hidden;
    }
    /* Menu button */
    .menu-btn {
      position: fixed;
      top: 1.2rem;
      left: 1.2rem;
      z-index: 1100;
      background: rgba(0,20,35,0.85);
      backdrop-filter: blur(8px);
      border: 1px solid #0ff;
      border-radius: 40px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 1.4rem;
      color: #0ff;
      transition: 0.2s;
    }
    .menu-btn:hover { background: #0ff22; box-shadow: 0 0 10px cyan; }
    /* Sidebar - tetap fixed tapi tidak menutupi karena konten bergeser */
    .sidebar {
      position: fixed;
      top: 0;
      left: -280px;
      width: 280px;
      height: 100vh;
      background: rgba(6,8,22,0.96);
      backdrop-filter: blur(20px);
      z-index: 1050;
      transition: left 0.3s cubic-bezier(0.2,0.9,0.4,1.1);
      border-right: 1px solid rgba(0,255,255,0.35);
      box-shadow: 8px 0 30px rgba(0,0,0,0.6);
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
    }
    .sidebar.open { left: 0; }
    /* Konten utama akan bergeser saat sidebar terbuka */
    .main-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem 1.5rem 2rem;
      transition: transform 0.3s cubic-bezier(0.2,0.9,0.4,1.1);
      transform: translateX(0);
      position: relative;
      z-index: 1;
    }
    body.sidebar-open .main-content {
      transform: translateX(280px);
    }
    /* Overlay */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(3px);
      z-index: 1040;
      display: none;
    }
    .overlay.active { display: block; }
    /* Responsif untuk layar kecil: konten tidak bergeser penuh, cukup padding */
    @media (max-width: 640px) {
      body.sidebar-open .main-content {
        transform: translateX(0);
        opacity: 0.5;
        pointer-events: none;
      }
      .sidebar {
        width: 260px;
      }
    }
    /* Style lainnya (sama seperti sebelumnya) */
    .sidebar-header h2 {
      font-size: 1.7rem;
      background: linear-gradient(125deg, #fff, #0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 40px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(0,255,255,0.2);
      cursor: pointer;
      margin: 10px 0;
      color: #ccf;
      transition: 0.2s;
    }
    .nav-item i { color: #0ff; width: 28px; }
    .nav-item.active, .nav-item:hover {
      background: rgba(0,255,255,0.12);
      border-color: #0ff;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.4rem;
      margin: 1rem 0;
    }
    .cyber-card {
      background: rgba(12,14,28,0.7);
      backdrop-filter: blur(12px);
      border-radius: 26px;
      border: 1px solid rgba(0,255,255,0.25);
      overflow: hidden;
    }
    .card-header {
      padding: 0.9rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px dashed rgba(0,255,255,0.2);
    }
    .card-header h3 { font-size: 1.2rem; color: #0ff; }
    .card-body { padding: 0.8rem 1.2rem 1.2rem; }
    input, select, textarea {
      width: 100%;
      background: rgba(0,0,0,0.55);
      border: 1px solid #2a3f6a;
      border-radius: 18px;
      padding: 8px 12px;
      color: #fff;
      margin: 8px 0;
    }
    button {
      background: linear-gradient(95deg, #0a1a2f, #010d1f);
      border: 1px solid #0ff;
      padding: 8px 14px;
      border-radius: 40px;
      font-weight: 600;
      color: #0ff;
      cursor: pointer;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    button:hover {
      background: #0ff;
      color: #000;
    }
    .output-area {
      margin-top: 0.9rem;
      background: #03050bc9;
      border-radius: 20px;
      padding: 10px;
      font-size: 0.75rem;
      font-family: monospace;
      border-left: 3px solid #0ff;
      max-height: 200px;
      overflow: auto;
    }
    .stats-widget {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin: 1rem 0;
    }
    .stat-home-card {
      background: rgba(0,30,45,0.5);
      border-radius: 28px;
      padding: 0.8rem 1.5rem;
      text-align: center;
      border: 1px solid #0ff;
    }
    .stat-home-number { font-size: 1.8rem; font-weight: 800; color: #0ff; }
    footer {
      text-align: center;
      margin-top: 2rem;
      padding: 1rem;
      border-top: 1px solid rgba(0,255,255,0.15);
      font-size: 0.7rem;
    }
    .hero-banner img, .category-banner img {
      width: 100%;
      border-radius: 28px;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
<div class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></div>
<div class="overlay" id="overlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header"><h2>INO.DIGITAL</h2><p>cyber core</p></div>
  <div class="nav-item active" data-section="home"><i class="fas fa-home"></i> Beranda</div>
  <div class="nav-item" data-section="ai"><i class="fas fa-microchip"></i> AI Tools</div>
  <div class="nav-item" data-section="random"><i class="fas fa-dice-d6"></i> Random</div>
  <div class="nav-item" data-section="maker"><i class="fas fa-magic"></i> Maker</div>
  <div class="nav-item" data-section="extra"><i class="fas fa-bolt"></i> Extra</div>
</aside>
<div class="main-content">
  <div id="home-section" class="section active-section">
    <div class="hero-banner"><img src="https://placehold.co/1200x300/0a0a1a/0ff?text=INO.DIGITAL+Banner" alt="Banner"></div>
    <h1 style="text-align:center; font-size:2.5rem; background:linear-gradient(125deg,#fff,#0ff); -webkit-background-clip:text; background-clip:text; color:transparent;">INO.DIGITAL</h1>
    <div class="stats-widget">
      <div class="stat-home-card"><i class="fas fa-chart-line"></i><div class="stat-home-number" id="statCalls">12.4K</div><div>Hits Today</div></div>
      <div class="stat-home-card"><i class="fas fa-cubes"></i><div class="stat-home-number">15</div><div>Endpoints</div></div>
    </div>
  </div>
  <div id="ai-section" class="section">
    <div class="category-banner"><img src="https://placehold.co/1200x200/0a0a1a/0ff?text=AI+Tools" alt="AI Banner"></div>
    <div class="card-grid">
      <div class="cyber-card"><div class="card-header"><i class="fas fa-robot"></i><h3>Blackbox AI</h3></div><div class="card-body"><input type="text" id="bb_prompt" placeholder="Prompt..."><button id="btn_blackbox"><i class="fas fa-terminal"></i> Generate</button><div class="output-area" id="output_blackbox"></div></div></div>
      <div class="cyber-card"><div class="card-header"><i class="fas fa-comment-dots"></i><h3>ChatGPT Free</h3></div><div class="card-body"><input type="text" id="chat_text" placeholder="Pesan..."><select id="chat_model"><option>chatgpt</option><option>deepseek</option></select><button id="btn_chatgpt"><i class="fas fa-message"></i> Kirim</button><div class="output-area" id="output_chatgpt"></div></div></div>
      <div class="cyber-card"><div class="card-header"><i class="fas fa-skull"></i><h3>WormGPT</h3></div><div class="card-body"><input type="text" id="worm_prompt" placeholder="Prompt..."><button id="btn_worm"><i class="fas fa-dragon"></i> Execute</button><div class="output-area" id="output_worm"></div></div></div>
    </div>
    <div class="card-grid">
      <div class="cyber-card"><div class="card-header"><i class="fas fa-expand-alt"></i><h3>Upscale 4K</h3></div><div class="card-body"><input type="file" id="upscale_file" accept="image/*"><button id="btn_upscale"><i class="fas fa-magic"></i> Upscale</button><div class="output-area" id="output_upscale"></div></div></div>
      <div class="cyber-card"><div class="card-header"><i class="fas fa-image"></i><h3>Image to Prompt</h3></div><div class="card-body"><input type="file" id="img2prompt_file" accept="image/*"><button id="btn_img2prompt"><i class="fas fa-code-branch"></i> Generate</button><div class="output-area" id="output_img2prompt"></div></div></div>
    </div>
  </div>
  <div id="random-section" class="section">
    <div class="category-banner"><img src="https://placehold.co/1200x200/0a0a1a/0ff?text=Random+Suite" alt="Random Banner"></div>
    <div class="card-grid">
      <div class="cyber-card"><div class="card-header"><i class="fas fa-landmark"></i><h3>Meme Presiden</h3></div><div class="card-body"><button id="btn_meme_pres"><i class="fas fa-random"></i> Ambil Meme</button><div class="output-area" id="output_meme_pres"></div></div></div>
      <div class="cyber-card"><div class="card-header"><i class="fas fa-heart"></i><h3>Random PAP</h3></div><div class="card-body"><button id="btn_pap"><i class="fas fa-user-secret"></i> Random PAP</button><div class="output-area" id="output_pap"></div></div></div>
      <div class="cyber-card"><div class="card-header"><i class="fas fa-desktop"></i><h3>Random Wallpaper</h3></div><div class="card-body"><button id="btn_wall"><i class="fas fa-images"></i> Ambil Wallpaper</button><div class="output-area" id="output_wall"></div></div></div>
    </div>
  </div>
  <div id="maker-section" class="section">
    <div class="category-banner"><img src="https://placehold.co/1200x200/0a0a1a/0ff?text=Maker+Studio" alt="Maker Banner"></div>
    <div class="card-grid">
      <div class="cyber-card"><div class="card-header"><i class="fas fa-gamepad"></i><h3>Fake Lobby FF</h3></div><div class="card-body"><input type="text" id="ff_user" placeholder="Username"><button id="btn_ff"><i class="fas fa-crown"></i> Buat</button><div class="output-area" id="output_ff"></div></div></div>
      <div class="cyber-card"><div class="card-header"><i class="fas fa-trophy"></i><h3>MLBB Fake Rank</h3></div><div class="card-body"><input type="text" id="ml_user" placeholder="Username"><input type="text" id="ml_rank" placeholder="Rank"><select id="ml_border"><option>Border 1</option><option>Border 2</option></select><button id="btn_ml"><i class="fas fa-chart-line"></i> Generate</button><div class="output-area" id="output_ml"></div></div></div>
      <div class="cyber-card"><div class="card-header"><i class="fas fa-phone-alt"></i><h3>Nokia Chat</h3></div><div class="card-body"><input type="text" id="nokia_sender" placeholder="Pengirim"><textarea id="nokia_msg" placeholder="Pesan"></textarea><button id="btn_nokia"><i class="fas fa-comment-dots"></i> Generate</button><div class="output-area" id="output_nokia"></div></div></div>
    </div>
  </div>
  <div id="extra-section" class="section">
    <div class="category-banner"><img src="https://placehold.co/1200x200/0a0a1a/0ff?text=Extra+Tools" alt="Extra Banner"></div>
    <div class="card-grid">
      <div class="cyber-card"><div class="card-header"><i class="fab fa-whatsapp"></i><h3>WA Reactor</h3></div><div class="card-body"><input type="text" id="wa_url" placeholder="Channel URL"><input type="text" id="wa_emojis" placeholder="🔥,❤️"><button id="btn_wa"><i class="fas fa-bolt"></i> React</button><div class="output-area" id="output_wa"></div></div></div>
      <div class="cyber-card"><div
